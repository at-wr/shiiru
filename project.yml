name: Shiiru
options:
  bundleIdPrefix: dev.alany
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

settings:
  base:
    # Single source of truth for app + extension versions (must match for
    # App Store submission). Bump these, then `xcodegen generate`.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
    DEVELOPMENT_TEAM: "SEWGNELGY8"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "NO"

packages:
  PhoneNumberKit:
    url: https://github.com/marmelroy/PhoneNumberKit
    minVersion: 3.7.0
    maxVersion: 3.9.9
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: "1.5.2-tdlib-1.8.66-07d3a097"
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    from: "4.5.2"

targets:
  StickerCore:
    type: library.static
    platform: iOS
    sources:
      - path: StickerCore
    settings:
      base:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SWIFT_OBJC_INTERFACE_HEADER_NAME: ""

  Shiiru:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
      - path: Shared
      # Panel sources are compiled into the app as well so unit tests can
      # exercise the extension UI in the simulator (the principal
      # MSMessagesAppViewController stays extension-only).
      - path: MessagesExtension/Sources
        excludes:
          - MessagesViewController.swift
      - path: Vendor/WebmParser
      - path: LICENSE
        buildPhase: resources
    dependencies:
      - package: TDLibKit
      - package: Lottie
        product: Lottie
      - package: PhoneNumberKit
      - target: StickerCore
      - target: MessagesExtension
        embed: true
      - framework: Vendor/libvpx.xcframework
        embed: false
      - sdk: libz.tbd
    entitlements:
      path: App/Shiiru.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.alany.shiiru
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Shiiru
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        CFBundleURLTypes:
          - CFBundleURLName: dev.alany.shiiru
            CFBundleURLSchemes:
              - shiiru
        # dev.alany.shiiru.sync: continued-processing task that keeps a
        # user-initiated sync running after the user leaves (iOS 26+).
        # dev.alany.shiiru.maintenance: discretionary processing task that
        # auto-syncs new/changed/stale packs with the app closed.
        BGTaskSchedulerPermittedIdentifiers:
          - dev.alany.shiiru.sync
          - dev.alany.shiiru.maintenance
        UIBackgroundModes:
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.alany.shiiru
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: App/Sources/Shiiru-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault

  MessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - path: MessagesExtension/Sources
      - path: MessagesExtension/Resources
      - path: Shared
    entitlements:
      path: MessagesExtension/MessagesExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.alany.shiiru
    info:
      path: MessagesExtension/Info.plist
      properties:
        CFBundleDisplayName: Shiiru
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.alany.shiiru.MessagesExtension
        ASSETCATALOG_COMPILER_APPICON_NAME: iMessage App Icon

  ShiiruTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Shiiru
      - target: StickerCore
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Shiiru.app/Shiiru"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Shiiru:
    build:
      targets:
        Shiiru: all
    run:
      config: Debug
    test:
      targets:
        - ShiiruTests
    archive:
      config: Release
